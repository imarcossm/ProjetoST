<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pedidos - Gestão</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Sistema de Pedidos</h1>
        <div id="connection-status"></div>
    </header>

    <nav>
        <button class="active" onclick="showSection('clientes')">Clientes</button>
        <button onclick="showSection('produtos')">Produtos</button>
        <button onclick="showSection('pedidos')">Pedidos</button>
        <button onclick="showSection('consultas')">Consultas</button>
    </nav>

    <main>
        <section id="clientes" class="section active">
            <div class="card">
                <h2>Cadastrar Cliente</h2>
                <div id="cliente-msg"></div>
                <form onsubmit="event.preventDefault(); salvarCliente();">
                    <div>
                        <label>Nome Completo</label>
                        <input type="text" id="c-nome" required>
                    </div>
                    <div>
                        <label>E-mail</label>
                        <input type="email" id="c-email" required>
                    </div>
                    <div>
                        <label>Data de Cadastro</label>
                        <input type="date" id="c-data" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Cliente</button>
                </form>
            </div>

            <div class="card">
                <h2>Listar/Buscar Clientes</h2>
                <div id="cliente-busca-msg"></div>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="text" id="c-busca" placeholder="Filtrar por nome...">
                    <button onclick="buscarClientes()" class="btn btn-secondary">Buscar</button>
                    <button onclick="listarClientes()" class="btn btn-secondary">Limpar</button>
                </div>
                <div id="clientes-result" class="results">
                </div>
            </div>
        </section>

        <section id="produtos" class="section">
            <div class="card">
                <h2>Cadastrar Produto</h2>
                <div id="produto-msg"></div>
                <form onsubmit="event.preventDefault(); salvarProduto();">
                    <div>
                        <label>Descrição/Nome</label>
                        <input type="text" id="p-nome" required>
                    </div>
                    <div>
                        <label>Valor Unitário (R$)</label>
                        <input type="number" id="p-valor" step="0.01" required>
                    </div>
                    <div>
                        <label>Estoque Inicial</label>
                        <input type="number" id="p-estoque" required>
                    </div>
                    <div>
                        <label>Data de Cadastro</label>
                        <input type="date" id="p-data" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Produto</button>
                </form>
            </div>

            <div class="card">
                <h2>Listar/Buscar Produtos</h2>
                <div id="produto-busca-msg"></div>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="text" id="p-busca" placeholder="Filtrar por nome...">
                    <button onclick="buscarProdutos()" class="btn btn-secondary">Buscar</button>
                    <button onclick="listarProdutos()" class="btn btn-secondary">Limpar</button>
                </div>
                <div id="produtos-result" class="results">
                </div>
            </div>
        </section>

        <section id="pedidos" class="section">
            <div class="card">
                <h2>Novo Pedido</h2>
                <div id="pedido-msg"></div>
                <form onsubmit="event.preventDefault(); criarPedido();">
                    <div>
                        <label>ID do Cliente</label>
                        <input type="number" id="ped-cliente" required>
                    </div>
                    <div>
                        <label>Data do Pedido</label>
                        <input type="date" id="ped-data" required>
                    </div>

                    <div style="margin: 20px 0;">
                        <h3>Itens do Pedido</h3>
                        <div id="items-container"></div>
                        <button type="button" class="btn btn-secondary" onclick="addItem()">+ Adicionar Produto</button>
                    </div>

                    <button type="submit" class="btn btn-success" style="width:100%; padding: 15px;">Finalizar
                        Pedido</button>
                </form>
            </div>

            <div class="card">
                <h2>Lista de Pedidos</h2>
                <div id="pedido-busca-msg"></div>
                <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; align-items: flex-end;">
                    <div>
                        <label>ID do Pedido</label>
                        <input type="number" id="ped-id-busca" placeholder="ID">
                    </div>
                    <button onclick="buscarPedidoPorId()" class="btn btn-secondary">Buscar por ID</button>

                    <div
                        style="border-left: 1px solid #ddd; padding-left: 10px; display: flex; gap: 10px; align-items: flex-end;">
                        <div>
                            <label>Início</label>
                            <input type="date" id="ped-data-inicio">
                        </div>
                        <div>
                            <label>Fim</label>
                            <input type="date" id="ped-data-fim">
                        </div>
                        <button onclick="buscarPedidosPorPeriodoUI()" class="btn btn-secondary">Filtrar por
                            Período</button>
                    </div>

                    <button onclick="listarTodosPedidos()" class="btn btn-secondary">Ver Todos</button>
                </div>
                <div id="pedidos-result-list" class="results">
                </div>
            </div>
        </section>

        <section id="consultas" class="section">
            <div class="card">
                <h2>Relatórios e Consultas</h2>
                <div id="q-msg"></div>

                <div style="margin-bottom: 20px;">
                    <label>Filtro por Cliente (ID)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="number" id="q-cliente-id">
                        <button onclick="pedidosPorCliente()" class="btn btn-secondary">Ver Pedidos</button>
                        <button onclick="totalGastoPorCliente()" class="btn btn-secondary">Calcular Total</button>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label>Filtro por Produto (ID)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="number" id="q-produto-id">
                        <button onclick="pedidosPorProduto()" class="btn btn-secondary">Ver Pedidos com este
                            Produto</button>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label>Filtro por Período</label>
                    <div style="display:flex; gap:10px; align-items: center;">
                        <input type="date" id="q-data-inicio">
                        <span>até</span>
                        <input type="date" id="q-data-fim">
                        <button onclick="pedidosPorPeriodo()" class="btn btn-secondary">Filtrar</button>
                    </div>
                </div>

                <hr style="margin: 20px 0;">

                <div id="q-result" class="results">
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
